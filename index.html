<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参政党街頭演説</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header id="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark">参政</span>
        <div class="brand-text">
          <h1>街頭演説アーカイブ</h1>
          <p class="tagline">過去の街頭演説を、地図と台帳から探す</p>
        </div>
      </div>
    </div>
  </header>

  <div id="main">

    <aside id="sidebar">
      <div id="search-panel">
        <label for="search-input" class="field-label">キーワード検索</label>
        <input type="search" id="search-input" placeholder="地名・演説者名から検索" autocomplete="off">

        <div class="filter-row">
          <div class="filter-field">
            <!-- <label for="year-start" class="field-label">開始年</label>
            <input type="number" id="year-start" placeholder="例: 1500" inputmode="numeric"> -->
            <label for="year-start" class="field-label">開始年月</label>
            <input type="month" id="year-start">
          </div>
          <div class="filter-field">
            <!-- <label for="year-end" class="field-label">終了年</label>
            <input type="number" id="year-end" placeholder="例: 1900" inputmode="numeric"> -->
            <label for="year-end" class="field-label">終了年月</label>
            <input type="month" id="year-end">
          </div>
        </div>

        <div class="filter-field">
          <label for="prefecture-select" class="field-label">都道府県</label>
          <select id="prefecture-select">
            <option value="">すべて</option>
          </select>
        </div>

        <button id="sort-toggle-btn" type="button" class="toggle-btn">並び替え: 新しい順</button>
        <button id="reset-btn" type="button">条件をリセット</button>
      </div>

      <div id="result-meta">
        <span id="result-count">0 件</span>
        <button id="download-btn" type="button" class="download-btn" title="現在の絞り込み結果をダウンロードします">ダウンロード</button>
      </div>

      <ol id="event-list" aria-label="イベント一覧"></ol>

      <nav id="pagination" aria-label="ページ送り"></nav>
    </aside>

    <main id="map" aria-label="イベント地図"></main>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="data/prefectures.js"></script>
<script src="app.js"></script>

</body>
</html>
